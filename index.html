<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Electricity Classifier</title>

  <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #fff;
      min-height: 100vh;
      padding: 3rem 1rem 4rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: 'Cormorant Garamond', serif;
      color: #111;
    }

    .title {
      font-family: 'Pinyon Script', cursive;
      font-size: 3.2rem;
      text-align: center;
      margin-bottom: 0.15rem;
    }

    .sub {
      font-size: 12px;
      letter-spacing: 0.18em;
      color: #888;
      text-transform: uppercase;
      margin-bottom: 2rem;
      text-align: center;
    }

    .card {
      background: #fff;
      border: 0.5px solid #ddd;
      border-radius: 6px;
      padding: 2rem 1.75rem;
      width: 100%;
      max-width: 440px;
    }

    .igroup { position: relative; margin-bottom: 0.9rem; }

    .igroup input {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.6rem;
      background: #fafafa;
      border: 0.5px solid #ddd;
      border-radius: 4px;
      font-size: 16px;
      font-family: 'Cormorant Garamond', serif;
      outline: none;
    }

    .igroup input:focus { border-color: #999; }

    .iico {
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
    }

    .btn {
      width: 100%;
      padding: 0.82rem;
      background: #111;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Cormorant Garamond', serif;
      letter-spacing: 0.12em;
    }

    .err {
      font-size: 12px;
      color: #888;
      margin-top: 0.4rem;
      display: none;
    }

    .result {
      margin-top: 1.5rem;
      border-top: 0.5px solid #eee;
      padding-top: 1.4rem;
      display: none;
    }

    .rtitle { font-size: 1.6rem; margin-bottom: 0.2rem; }
    .rrange { font-size: 12px; color: #999; margin-bottom: 0.5rem; }
    .rdesc { font-size: 14px; color: #555; font-style: italic; margin-bottom: 1rem; }

    .tlabel {
      font-size: 11px;
      letter-spacing: 0.16em;
      color: #999;
      text-transform: uppercase;
      margin-bottom: 0.7rem;
    }

    .tip {
      display: flex;
      gap: 10px;
      padding: 0.45rem 0;
      border-bottom: 0.5px solid #f0f0f0;
      font-size: 14px;
      color: #444;
    }

    .tip:last-child { border-bottom: none; }

    .tnum {
      font-size: 11px;
      color: #aaa;
      min-width: 18px;
    }
  </style>
</head>

<body>

  <div class="title">Electricity Classifier</div>
  <div class="sub">Consumption · Classification · Tips</div>

  <div class="card">

    <div class="igroup">
      <svg class="iico" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>
      </svg>

      <input type="number" id="kwh" placeholder="Enter kilowatt-hours…" min="0">
    </div>

    <div class="err" id="err">Please enter a valid number.</div>

    <button class="btn" onclick="classify()">Classify Consumption</button>

    <div class="result" id="res">

      <div class="rtitle" id="rt"></div>
      <div class="rrange" id="rr"></div>
      <div class="rdesc" id="rd"></div>

      <div class="tlabel">How to Save</div>
      <div id="tips"></div>

    </div>
  </div>

<script>
const tiers = [
  {
    t: "Lifeline Consumer",
    r: "0 – 100 kWh",
    d: "Very low usage.",
    tips: [
      "Open curtains in the morning",
      "Turn off lights in the morning",
      "Unplug devices when not used",
      "Use LED bulbs"
    ]
  },
  {
    t: "Low Consumption",
    r: "101 – 200 kWh",
    d: "Low and efficient usage.",
    tips: [
      "Set aircon to 25°C",
      "Dry clothes outside",
      "Turn off lights when leaving",
      "Unplug unused chargers"
    ]
  },
  {
    t: "Average Consumption",
    r: "201 – 300 kWh",
    d: "Normal usage.",
    tips: [
      "Turn off TV when not used",
      "Use power strip switch",
      "Clean aircon filter",
      "Open windows in the morning"
    ]
  },
  {
    t: "High Consumption",
    r: "301 – 500 kWh",
    d: "High usage.",
    tips: [
      "Don’t use many appliances at once",
      "Close doors when aircon is on",
      "Wash full loads only",
      "Turn off aircon when leaving"
    ]
  },
  {
    t: "Very High Consumption",
    r: "Above 500 kWh",
    d: "Very high usage.",
    tips: [
      "Unplug unused devices",
      "Use less aircon",
      "Avoid standby power",
      "Use daylight when possible"
    ]
  }
];

function classify() {
  const v = parseFloat(document.getElementById("kwh").value);
  const err = document.getElementById("err");
  const res = document.getElementById("res");

  if (isNaN(v) || v < 0) {
    err.style.display = "block";
    res.style.display = "none";
    return;
  }

  err.style.display = "none";

  const d =
    v <= 100 ? tiers[0] :
    v <= 200 ? tiers[1] :
    v <= 300 ? tiers[2] :
    v <= 500 ? tiers[3] :
    tiers[4];

  document.getElementById("rt").textContent = d.t;
  document.getElementById("rr").textContent = d.r;
  document.getElementById("rd").textContent = d.d;

  document.getElementById("tips").innerHTML =
    d.tips.map((t, i) =>
      `<div class="tip"><span class="tnum">0${i+1}</span><span>${t}</span></div>`
    ).join("");

  res.style.display = "block";
}
</script>

</body>
</html>
